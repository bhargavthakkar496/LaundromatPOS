name: laundromat_pos_flutter
description: Flutter scaffold for the Laundromat POS demo flow.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.20.2
  flutter_svg: ^2.2.4
  url_launcher: ^6.3.2
  printing: ^5.14.3
  pdf: ^3.11.3
  web: ^1.1.1
  shared_preferences: ^2.5.5
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  shared_preferences_platform_interface: ^2.4.2

flutter:
  uses-material-design: true
  assets:
    - assets/icons/washer.svg
    - assets/icons/dryer.svg
