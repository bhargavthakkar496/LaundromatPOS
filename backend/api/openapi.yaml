openapi: 3.1.0
info:
  title: WashPOS Backend API
  version: 0.1.0
  description: >
    Backend contract matching the current Flutter BackendPosRepository.
servers:
  - url: https://api.example.com
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Machines
  - name: Customers
  - name: Inventory
  - name: Maintenance
  - name: Pricing
  - name: Orders
  - name: Payments
  - name: Reservations
  - name: ActiveOrderSession
paths:
  /auth/login:
    post:
      tags: [Auth]
      security: []
      summary: Authenticate an operator
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, pin]
              properties:
                username:
                  type: string
                pin:
                  type: string
      responses:
        "200":
          description: Authenticated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "401":
          description: Invalid credentials
  /machines:
    get:
      tags: [Machines]
      summary: List machines
      parameters:
        - in: query
          name: status
          required: false
          schema:
            $ref: "#/components/schemas/MachineStatus"
      responses:
        "200":
          description: Machine list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Machine"
  /machines/{machineId}:
    get:
      tags: [Machines]
      summary: Get a single machine
      parameters:
        - $ref: "#/components/parameters/MachineId"
      responses:
        "200":
          description: Machine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Machine"
        "404":
          description: Machine not found
  /machines/reservable:
    get:
      tags: [Machines]
      summary: List reservable machines in a time window
      parameters:
        - in: query
          name: machineType
          required: true
          schema:
            type: string
        - in: query
          name: startTime
          required: true
          schema:
            type: string
            format: date-time
        - in: query
          name: endTime
          required: true
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Reservable machines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Machine"
  /machines/{machineId}/pickup:
    post:
      tags: [Machines]
      summary: Mark a machine order as picked up and clear assignment
      parameters:
        - $ref: "#/components/parameters/MachineId"
      responses:
        "200":
          description: Updated machine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Machine"
  /customers/by-phone:
    get:
      tags: [Customers]
      summary: Find a customer by phone
      parameters:
        - in: query
          name: phone
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Customer found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: Customer not found
  /customers/walk-in:
    post:
      tags: [Customers]
      summary: Create or update a walk-in customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveWalkInCustomerRequest"
      responses:
        "200":
          description: Customer saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
  /customers/profile:
    get:
      tags: [Customers]
      summary: Get a customer profile with history and aggregates
      parameters:
        - in: query
          name: phone
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Customer profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerProfile"
        "404":
          description: Customer not found
  /inventory/dashboard:
    get:
      tags: [Inventory]
      summary: Get inventory dashboard metrics, category summaries, and filter options
      responses:
        "200":
          description: Inventory dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryDashboard"
  /inventory/items:
    get:
      tags: [Inventory]
      summary: List inventory items with search, filters, and sorting
      parameters:
        - in: query
          name: q
          required: false
          schema:
            type: string
        - in: query
          name: category
          required: false
          schema:
            type: string
        - in: query
          name: stockStatus
          required: false
          schema:
            $ref: "#/components/schemas/InventoryStockStatus"
        - in: query
          name: supplier
          required: false
          schema:
            type: string
        - in: query
          name: branch
          required: false
          schema:
            type: string
        - in: query
          name: location
          required: false
          schema:
            type: string
        - in: query
          name: sortBy
          required: false
          schema:
            type: string
            enum: [quantity, lastRestockedAt, reorderUrgency]
        - in: query
          name: sortOrder
          required: false
          schema:
            type: string
            enum: [asc, desc]
      responses:
        "200":
          description: Filtered inventory items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItem"
  /inventory/restock-requests:
    get:
      tags: [Inventory]
      summary: List inventory restock requests
      parameters:
        - in: query
          name: status
          required: false
          schema:
            $ref: "#/components/schemas/InventoryRestockRequestStatus"
      responses:
        "200":
          description: Restock request list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryRestockRequest"
    post:
      tags: [Inventory]
      summary: Create a restock request for an inventory item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInventoryRestockRequest"
      responses:
        "201":
          description: Restock request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryRestockRequest"
        "404":
          description: Inventory item not found
        "409":
          description: Item is not eligible or already has a pending request
  /inventory/restock-requests/{restockRequestId}/approve:
    post:
      tags: [Inventory]
      summary: Approve a pending inventory restock request with operator remarks
      parameters:
        - in: path
          name: restockRequestId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveInventoryRestockRequest"
      responses:
        "200":
          description: Restock request approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryRestockRequest"
        "404":
          description: Restock request not found
        "409":
          description: Restock request already processed
  /maintenance/eligible-machines:
    get:
      tags: [Maintenance]
      summary: List machines that can be marked for maintenance
      responses:
        "200":
          description: Available devices eligible for maintenance
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Machine"
  /maintenance/records:
    get:
      tags: [Maintenance]
      summary: List maintenance records
      parameters:
        - in: query
          name: status
          required: false
          schema:
            $ref: "#/components/schemas/MaintenanceStatus"
      responses:
        "200":
          description: Maintenance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MaintenanceRecord"
    post:
      tags: [Maintenance]
      summary: Create a maintenance record and move the device into maintenance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMaintenanceRecordRequest"
      responses:
        "201":
          description: Maintenance record created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceRecord"
        "400":
          description: Invalid request or machine not eligible
        "404":
          description: Machine not found
  /maintenance/records/{recordId}/start:
    post:
      tags: [Maintenance]
      summary: Start work on a marked maintenance record
      parameters:
        - in: path
          name: recordId
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartMaintenanceRecordRequest"
      responses:
        "200":
          description: Maintenance record moved to in progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceRecord"
        "404":
          description: Maintenance record not found
  /maintenance/records/{recordId}/complete:
    post:
      tags: [Maintenance]
      summary: Complete maintenance and return the device to available service
      parameters:
        - in: path
          name: recordId
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteMaintenanceRecordRequest"
      responses:
        "200":
          description: Maintenance completed and device restored to service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceRecord"
        "404":
          description: Maintenance record not found
  /pricing/service-fees:
    get:
      tags: [Pricing]
      summary: List service-level pricing fees
      responses:
        "200":
          description: Service fee list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PricingServiceFee"
  /pricing/service-fees/{serviceCode}:
    patch:
      tags: [Pricing]
      summary: Update a pricing service fee
      parameters:
        - in: path
          name: serviceCode
          required: true
          schema:
            type: string
            enum: [Washing, Drying, Ironing]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, isEnabled]
              properties:
                amount:
                  type: number
                isEnabled:
                  type: boolean
      responses:
        "200":
          description: Updated service fee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PricingServiceFee"
  /pricing/campaigns:
    get:
      tags: [Pricing]
      summary: List pricing campaigns
      parameters:
        - in: query
          name: activeOnly
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Campaign list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PricingCampaign"
    post:
      tags: [Pricing]
      summary: Create a pricing campaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePricingCampaignRequest"
      responses:
        "201":
          description: Created campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PricingCampaign"
  /pricing/campaigns/{campaignId}:
    patch:
      tags: [Pricing]
      summary: Update a pricing campaign
      parameters:
        - in: path
          name: campaignId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePricingCampaignRequest"
      responses:
        "200":
          description: Updated campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PricingCampaign"
  /pricing/machines/{machineId}:
    patch:
      tags: [Pricing]
      summary: Update one machine base rate
      parameters:
        - $ref: "#/components/parameters/MachineId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [price]
              properties:
                price:
                  type: number
      responses:
        "200":
          description: Updated machine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Machine"
  /pricing/quote:
    post:
      tags: [Pricing]
      summary: Preview a quote using current machine rates, service fees, and campaigns
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePricingQuoteRequest"
      responses:
        "200":
          description: Quote preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PricingQuote"
  /orders/history:
    get:
      tags: [Orders]
      summary: List order history items
      responses:
        "200":
          description: Order history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderHistoryItem"
  /orders/{orderId}/history-item:
    get:
      tags: [Orders]
      summary: Get one order history item
      parameters:
        - $ref: "#/components/parameters/OrderId"
      responses:
        "200":
          description: Order history item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderHistoryItem"
        "404":
          description: Order not found
  /orders/paid:
    post:
      tags: [Orders]
      summary: Create a paid direct-checkout order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaidOrderRequest"
      responses:
        "200":
          description: Paid order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
  /orders/manual:
    post:
      tags: [Orders]
      summary: Create a manual operator-booked order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateManualOrderRequest"
      responses:
        "200":
          description: Manual order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
  /orders/{orderId}/refund:
    post:
      tags: [Orders]
      summary: Mark refund processed
      parameters:
        - $ref: "#/components/parameters/OrderId"
      responses:
        "200":
          description: Refunded order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found
  /payments/sessions:
    post:
      tags: [Payments]
      summary: Create a payment session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentSessionRequest"
      responses:
        "200":
          description: Payment session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentSession"
  /payments/sessions/{sessionId}:
    get:
      tags: [Payments]
      summary: Poll payment session status
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Payment session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentSession"
        "404":
          description: Session not found
  /reservations:
    post:
      tags: [Reservations]
      summary: Create a machine reservation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReservationRequest"
      responses:
        "200":
          description: Reservation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MachineReservation"
  /active-order-session:
    get:
      tags: [ActiveOrderSession]
      summary: Get the current active shared order session
      responses:
        "200":
          description: Active order session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveOrderSession"
        "404":
          description: No active session
    delete:
      tags: [ActiveOrderSession]
      summary: Clear the active shared order session
      responses:
        "204":
          description: Session cleared
  /active-order-session/draft:
    post:
      tags: [ActiveOrderSession]
      summary: Save a draft shared order session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveActiveOrderDraftRequest"
      responses:
        "200":
          description: Draft session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveOrderSession"
  /active-order-session/confirm:
    post:
      tags: [ActiveOrderSession]
      summary: Confirm the current active order session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirmedBy]
              properties:
                confirmedBy:
                  type: string
                userId:
                  type: integer
      responses:
        "200":
          description: Confirmed session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveOrderSession"
        "404":
          description: No active session
  /active-order-session/payment:
    post:
      tags: [ActiveOrderSession]
      summary: Complete payment for the active order session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [paymentReference]
              properties:
                paymentReference:
                  type: string
      responses:
        "200":
          description: Paid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveOrderSession"
        "404":
          description: No payable session
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    MachineId:
      in: path
      name: machineId
      required: true
      schema:
        type: integer
    OrderId:
      in: path
      name: orderId
      required: true
      schema:
        type: integer
  schemas:
    UserRole:
      type: string
      enum: [ADMIN, MANAGER, CASHIER, TECHNICIAN, SUPPORT]
    MachineStatus:
      type: string
      enum: [AVAILABLE, MAINTENANCE, IN_USE, READY_FOR_PICKUP]
    OrderStatus:
      type: string
      enum: [BOOKED, IN_PROGRESS, COMPLETED, CANCELLED]
    PaymentStatus:
      type: string
      enum: [PENDING, PAID, FAILED, REFUNDED]
    PricingDiscountType:
      type: string
      enum: [PERCENT, FIXED]
    PaymentSessionStatus:
      type: string
      enum: [AWAITING_SCAN, PROCESSING, PAID, FAILED]
    ReservationStatus:
      type: string
      enum: [BOOKED, FULFILLED, CANCELLED]
    ActiveOrderSessionStage:
      type: string
      enum: [DRAFT, BOOKED, PAID]
    InventoryStockStatus:
      type: string
      enum: [HEALTHY, LOW, OUT_OF_STOCK]
    InventoryRestockRequestStatus:
      type: string
      enum: [PENDING, APPROVED]
    MaintenancePriority:
      type: string
      enum: [LOW, MEDIUM, HIGH]
    MaintenanceStatus:
      type: string
      enum: [MARKED, IN_PROGRESS, COMPLETED]
    PosUser:
      type: object
      required: [id, username, displayName, role]
      properties:
        id:
          type: integer
        username:
          type: string
        displayName:
          type: string
        pin:
          type: string
          description: Usually omitted or blank in backend responses.
        role:
          $ref: "#/components/schemas/UserRole"
    AuthSession:
      type: object
      required: [accessToken, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
        user:
          $ref: "#/components/schemas/PosUser"
    Machine:
      type: object
      required: [id, name, type, capacityKg, price, status]
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
        capacityKg:
          type: integer
        price:
          type: number
        status:
          $ref: "#/components/schemas/MachineStatus"
        currentOrderId:
          type: integer
          nullable: true
        cycleStartedAt:
          type: string
          format: date-time
          nullable: true
        cycleEndsAt:
          type: string
          format: date-time
          nullable: true
    Customer:
      type: object
      required: [id, fullName, phone]
      properties:
        id:
          type: integer
        fullName:
          type: string
        phone:
          type: string
        preferredWasherSizeKg:
          type: integer
          nullable: true
        preferredDetergentAddOn:
          type: string
          nullable: true
        preferredDryerDurationMinutes:
          type: integer
          nullable: true
    InventoryCategorySummary:
      type: object
      required: [category, itemCount, lowStockCount, outOfStockCount]
      properties:
        category:
          type: string
        itemCount:
          type: integer
        lowStockCount:
          type: integer
        outOfStockCount:
          type: integer
    InventoryDashboardMetrics:
      type: object
      required:
        [
          lowStockCount,
          outOfStockCount,
          stockValue,
          pendingPurchaseOrders,
          expiringSoonCount,
        ]
      properties:
        lowStockCount:
          type: integer
        outOfStockCount:
          type: integer
        stockValue:
          type: number
        pendingPurchaseOrders:
          type: integer
        expiringSoonCount:
          type: integer
    InventoryDashboard:
      type: object
      required: [metrics, categories, suppliers, branches, locations]
      properties:
        metrics:
          $ref: "#/components/schemas/InventoryDashboardMetrics"
        categories:
          type: array
          items:
            $ref: "#/components/schemas/InventoryCategorySummary"
        suppliers:
          type: array
          items:
            type: string
        branches:
          type: array
          items:
            type: string
        locations:
          type: array
          items:
            type: string
    InventoryItem:
      type: object
      required:
        [
          id,
          sku,
          name,
          category,
          branch,
          location,
          unit,
          quantityOnHand,
          reorderPoint,
          unitCost,
          stockValue,
          stockStatus,
          reorderUrgencyScore,
        ]
      properties:
        id:
          type: integer
        sku:
          type: string
        name:
          type: string
        category:
          type: string
        supplier:
          type: string
          nullable: true
        branch:
          type: string
        location:
          type: string
        unit:
          type: string
        quantityOnHand:
          type: integer
        reorderPoint:
          type: integer
        unitCost:
          type: number
        stockValue:
          type: number
        lastRestockedAt:
          type: string
          format: date-time
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
        stockStatus:
          $ref: "#/components/schemas/InventoryStockStatus"
        reorderUrgencyScore:
          type: integer
        activeRestockRequestId:
          type: integer
          nullable: true
        activeRestockRequestStatus:
          allOf:
            - $ref: "#/components/schemas/InventoryRestockRequestStatus"
          nullable: true
    InventoryRestockRequest:
      type: object
      required:
        [
          id,
          requestNumber,
          inventoryItemId,
          itemName,
          itemSku,
          itemCategory,
          branch,
          location,
          unit,
          requestedQuantity,
          status,
          createdAt,
        ]
      properties:
        id:
          type: integer
        requestNumber:
          type: string
        inventoryItemId:
          type: integer
        itemName:
          type: string
        itemSku:
          type: string
        itemCategory:
          type: string
        supplier:
          type: string
          nullable: true
        branch:
          type: string
        location:
          type: string
        unit:
          type: string
        requestedQuantity:
          type: integer
        status:
          $ref: "#/components/schemas/InventoryRestockRequestStatus"
        requestNotes:
          type: string
          nullable: true
        operatorRemarks:
          type: string
          nullable: true
        requestedByName:
          type: string
          nullable: true
        approvedByName:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        approvedAt:
          type: string
          format: date-time
          nullable: true
    MaintenanceRecord:
      type: object
      required:
        [
          id,
          machineId,
          issueTitle,
          priority,
          status,
